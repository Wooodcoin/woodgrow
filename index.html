<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoodGrow Coin Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-main: #0a1f0f; 
            --neon-green: #0df25d;
            --gold-gradient: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa7c11 100%);
            --gold-color: #d4af37;
            --text-dark: #111111;
            --text-light: #ffffff;
            --card-bg: rgba(212, 175, 55, 0.15);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding-bottom: 180px;
        }
        .container { padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: var(--card-bg);
            border: 2px solid var(--gold-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .balance-value { font-size: 38px; font-weight: 900; margin: 10px 0; }
        .btn {
            width: 100%;
            background: var(--gold-gradient);
            color: var(--text-dark);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            margin: 10px 0;
        }
        .btn:disabled { background: #27272a; color: #71717a; }
        .nav-bar {
            position: fixed;
            bottom: 60px; left: 0; right: 0;
            height: 65px;
            background: #141416;
            border-top: 2px solid var(--gold-color);
            display: flex;
            z-index: 1000;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: #71717a;
            font-size: 11px;
            cursor: pointer;
        }
        .nav-item.active { color: var(--neon-green); }
    </style>
</head>
<body>

<div class="container">
    <!-- Головна вкладка -->
    <div id="tab-main" class="tab-content active">
        <div class="card">
            <div>Мій Баланс</div>
            <div class="balance-value"><span id="user-balance">0.0000</span> USDT</div>
        </div>

        <button class="btn" onclick="watchAd(1)">СЕРВІС 1 (Adsgram +0.0004)</button>
        <button class="btn" onclick="watchAd(4)">СЕРВІС 4 (Monetag +0.0004)</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SUPABASE_URL = "https://ebgfhzizbcxsxpfqusap.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wSVAHiv6Wc7q6T5GVurACg_wiZSTlpt"; // ← ЗМІНИ НА СВІЙ РЕАЛЬНИЙ ANON KEY

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let userId = tg.initDataUnsafe?.user?.id?.toString() || "6043278492";
    let balance = 0;

    async function loadBalance() {
        try {
            const { data } = await supabase
                .from('Users')
                .select('balance')
                .eq('id', userId)
                .maybeSingle();

            if (data) {
                balance = parseFloat(data.balance) || 0;
                document.getElementById('user-balance').innerText = balance.toFixed(4);
            }
        } catch(e) { console.error(e); }
    }

    async function watchAd(service) {
        const reward = 0.0004;
        try {
            const { data, error } = await supabase.rpc('reward_user_safe', {
                user_id_param: parseInt(userId),
                reward_amount: reward
            });

            if (data !== null) {
                balance = parseFloat(data);
                document.getElementById('user-balance').innerText = balance.toFixed(4);
                alert(`✅ +${reward} USDT зараховано!`);
            } else {
                alert("Помилка нарахування");
            }
        } catch(e) {
            console.error(e);
            alert("Помилка з'єднання з Supabase");
        }
    }

    // Запуск
    loadBalance();
</script>
</body>
</html>
