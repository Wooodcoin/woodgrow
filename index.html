<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodGrow Coin</title>
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #162a17, #070d07);
            color: #f0f3f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            user-select: none;
        }
        .header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(140, 217, 150, 0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
            color: #8cd996;
            text-transform: uppercase;
        }
        .content-section {
            flex: 1;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .content-section.active {
            display: flex;
        }
        .logo-container {
            font-size: 80px;
            margin: 20px 0;
        }
        .balance-card {
            background: rgba(43, 76, 45, 0.3);
            border: 1px solid #5c8a60;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            width: 85%;
        }
        .balance-label { font-size: 12px; color: #a3c2a8; text-transform: uppercase; }
        .balance-value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #5c8a60;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 2px solid #8cd996;
        }
        .username { font-size: 18px; font-weight: bold; margin-bottom: 20px; }

        .ref-box {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .ref-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #5c8a60;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .btn {
            width: 100%;
            max-width: 280px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #8d6e63, #4e342e);
            margin-top: 15px;
        }

        .nav-bar {
            height: 65px;
            background: rgba(13, 26, 14, 0.95);
            border-top: 1px solid rgba(140, 217, 150, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #709475;
            font-size: 11px;
            cursor: pointer;
            flex: 1;
        }
        .nav-item.active { color: #8cd996; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        
        #ton-btn-space {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 15px;
            min-height: 45px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>WoodGrow Coin</h1>
    </div>

    <!-- ЕКРАН 1: ГОЛОВНА -->
    <div id="screen-home" class="content-section active">
        <div class="logo-container">🌳</div>
        <div class="balance-card">
            <div class="balance-label">Баланс рахунку</div>
            <div class="balance-value"><span id="balance">0.0000</span> USDT</div>
        </div>
        <button class="btn" onclick="watchAd()">👁 Дивитись відео (+0.005 USDT)</button>
    </div>

    <!-- ЕКРАН 2: КАБІНЕТ -->
    <div id="screen-profile" class="content-section">
        <div class="avatar" id="user-avatar">👤</div>
        <div class="username" id="user-name">Користувач</div>
        <div class="balance-card" style="width:100%;">
            <div class="balance-label">Переглянуто роликів</div>
            <div class="balance-value" id="stats-views">0</div>
        </div>
        <!-- Простір для кнопки гаманця -->
        <div id="ton-btn-space"></div>
        <button class="btn btn-secondary" onclick="alert('Мінімальний вивід: 5 USDT')">📥 Вивести кошти</button>
    </div>

    <!-- ЕКРАН 3: ДРУЗІ -->
    <div id="screen-friends" class="content-section">
        <h2>Запроси друзів</h2>
        <div class="ref-box">
            <input type="text" class="ref-input" id="ref-link" value="" readonly>
            <button class="btn" onclick="copyRefLink()">📋 Копіювати посилання</button>
        </div>
    </div>

    <!-- НАВІГАЦІЯ -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchScreen('home', this)">
            <div class="nav-icon">🌳</div>
            <div>Головна</div>
        </div>
        <div class="nav-item" onclick="switchScreen('profile', this)">
            <div class="nav-icon">👤</div>
            <div>Кабінет</div>
        </div>
        <div class="nav-item" onclick="switchScreen('friends', this)">
            <div class="nav-icon">👥</div>
            <div>Друзі</div>
        </div>
    </div>

<script>
    // Ініціалізація Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Створюємо базові значення на випадок, якщо Telegram ще не передав дані
    let uid = "id" + Math.floor(100000 + Math.random() * 900000);
    let uname = "Користувач WoodGrow";

    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        if(tg.initDataUnsafe.user.id) uid = tg.initDataUnsafe.user.id;
        if(tg.initDataUnsafe.user.username) uname = '@' + tg.initDataUnsafe.user.username;
        else if(tg.initDataUnsafe.user.first_name) uname = tg.initDataUnsafe.user.first_name;
    }
    
    document.getElementById('user-name').innerText = uname;
    document.getElementById('user-avatar').innerText = uname.charAt(0) === '@' ? uname.charAt(1).toUpperCase() : uname.charAt(0).toUpperCase();

    // Стабільне підключення TON Connect Button
    try {
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://github.io',
            buttonRootId: 'ton-btn-space'
        });
    } catch(err) {
        console.error("Помилка ініціалізації гаманця:", err);
    }

    // Логіка клікера/балансу
    let bal = 0.0000;
    let views = 0;

    function watchAd() {
        alert("Тут запускатиметься реальне відео Adsgram!");
        bal += 0.0050;
        views += 1;
        document.getElementById('balance').innerText = bal.toFixed(4);
        document.getElementById('stats-views').innerText = views;
    }

    // Перемикання табів
    function switchScreen(sId, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('screen-' + sId).classList.add('active');
        el.classList.add('active');
    }

    // Насильно записуємо рефералку
    document.getElementById('ref-link').value = "https://t.me_" + uid;

    // Функція копіювання
    function copyRefLink() {
        const inp = document.getElementById("ref-link");
        inp.select();
        inp.setSelectionRange(0, 99999);
        try {
            document.execCommand("copy");
            navigator.clipboard.writeText(inp.value);
        } catch(e) {}
        alert("Посилання скопійовано! Відправте його друзям.");
    }
</script>
</body>
</html>
