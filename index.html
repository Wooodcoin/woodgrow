<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodGrow Coin</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { padding: 30px; background: #0a1f0f; color: white; font-family: sans-serif; text-align: center; }
        button { 
            width: 100%; 
            padding: 25px; 
            margin: 15px 0; 
            font-size: 20px; 
            background: #d4af37; 
            color: black; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold;
        }
        .balance { font-size: 32px; font-weight: bold; margin: 20px 0; color: #0df25d; }
    </style>
</head>
<body>

<h2>WoodGrow Coin</h2>
<div class="balance">Баланс: <span id="balance">0.0000</span> USDT</div>

<button onclick="addMoney()">+0.0004 USDT (Тест)</button>
<button onclick="loadBalance()">Оновити баланс</button>

<script>
    alert("✅ Бот завантажився!");

    const SUPABASE_URL = "https://ebgfhzizbcxsxpfqusap.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wSVAHiv6Wc7q6T5GVurACg_wiZSTlpt";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let userId = "6043278492";
    let balance = 0;

    async function addMoney() {
        try {
            const { data, error } = await supabase.rpc('reward_user_safe', {
                user_id_param: parseInt(userId),
                reward_amount: 0.0004
            });

            if (error) {
                alert("Помилка: " + error.message);
            } else {
                balance = parseFloat(data);
                document.getElementById('balance').innerText = balance.toFixed(4);
                alert("✅ +0.0004 USDT зараховано!");
            }
        } catch(e) {
            alert("Критична помилка: " + e.message);
        }
    }

    async function loadBalance() {
        try {
            const { data, error } = await supabase
                .from('Users')
                .select('balance')
                .eq('id', userId)
                .maybeSingle();

            if (error) {
                alert("Помилка завантаження: " + error.message);
            } else {
                balance = data ? parseFloat(data.balance) : 0;
                document.getElementById('balance').innerText = balance.toFixed(4);
            }
        } catch(e) {
            alert("Помилка: " + e.message);
        }
    }

    // Автозапуск
    loadBalance();
</script>

</body>
</html>
