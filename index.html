<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodGrow Coin</title>
    <!-- Офіційні стабільні скрипти -->
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #162a17, #070d07);
            color: #f0f3f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            user-select: none;
        }
        .header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(140, 217, 150, 0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
            color: #8cd996;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .content-section {
            flex: 1;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .content-section.active {
            display: flex;
        }
        .logo-container {
            font-size: 80px;
            margin: 20px 0;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .balance-card {
            background: rgba(43, 76, 45, 0.3);
            border: 1px solid #5c8a60;
            border-radius: 16px;
            padding: 15px 30px;
            text-align: center;
            margin-bottom: 25px;
            width: 80%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .balance-label { font-size: 12px; color: #a3c2a8; text-transform: uppercase; }
        .balance-value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #5c8a60;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 2px solid #8cd996;
        }
        .username { font-size: 18px; font-weight: bold; margin-bottom: 20px; }

        .ref-box {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            margin-top: 15px;
        }
        .ref-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #5c8a60;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .btn {
            width: 100%;
            max-width: 280px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #8d6e63, #4e342e);
            box-shadow: 0 4px 12px rgba(78, 52, 46, 0.3);
            margin-top: 15px;
        }

        .nav-bar {
            height: 65px;
            background: rgba(13, 26, 14, 0.95);
            border-top: 1px solid rgba(140, 217, 150, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #709475;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            flex: 1;
            padding: 10px 0;
        }
        .nav-item.active { color: #8cd996; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        
        /* Стиль для контейнера кнопки TON Connect */
        #ton-connect-btn {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="header-title">WoodGrow Coin</h1>
    </div>

    <!-- ЕКРАН 1: ГОЛОВНА -->
    <div id="screen-home" class="content-section active">
        <div class="logo-container">🌳</div>
        <div class="balance-card">
            <div class="balance-label">Баланс рахунку</div>
            <div class="balance-value"><span id="balance">0.0000</span> USDT</div>
        </div>
        <button class="btn" onclick="watchAd()">👁 Дивитись відео (+0.005 USDT)</button>
    </div>

    <!-- ЕКРАН 2: КАБІНЕТ -->
    <div id="screen-profile" class="content-section">
        <div class="avatar" id="user-avatar">👤</div>
        <div class="username" id="user-name">Користувач</div>
        <div class="balance-card" style="width:100%;">
            <div class="balance-label">Переглянуто роликів</div>
            <div class="balance-value" id="stats-views" style="font-size: 22px;">0</div>
        </div>
        <!-- Сюди вбудується офіційна кнопка гаманця -->
        <div id="ton-connect-btn"></div>
        <button class="btn btn-secondary" onclick="withdraw()">📥 Вивести кошти</button>
    </div>

    <!-- ЕКРАН 3: ДРУЗІ -->
    <div id="screen-friends" class="content-section">
        <h2>Запроси друзів</h2>
        <p style="text-align:center; color:#a3c2a8; font-size:14px; margin:0 10px 15px 10px;">Отримуй +10% від заробітку кожного запрошеного друга!</p>
        <div class="ref-box">
            <input type="text" class="ref-input" id="ref-link" value="" readonly>
            <button class="btn" onclick="copyRefLink()">📋 Копіювати посилання</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchScreen('home', this)">
            <div class="nav-icon">🌳</div>
            <div>Головна</div>
        </div>
        <div class="nav-item" onclick="switchScreen('profile', this)">
            <div class="nav-icon">👤</div>
            <div>Кабінет</div>
        </div>
        <div class="nav-item" onclick="switchScreen('friends', this)">
            <div class="nav-icon">👥</div>
            <div>Друзі</div>
        </div>
    </div>

<script>
    // 1. Ініціалізація Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let userId = "guest_" + Math.floor(Math.random() * 100000);
    let userName = "Гість WoodGrow";

    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        userId = user.id;
        userName = user.username ? '@' + user.username : user.first_name;
    }
    
    document.getElementById('user-name').innerText = userName;
    document.getElementById('user-avatar').innerText = userName.charAt(0) === '@' ? userName.charAt(1).toUpperCase() : userName.charAt(0).toUpperCase();

    // 2. Стабільна ініціалізація TON Connect UI
    try {
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://github.io',
            buttonRootId: 'ton-connect-btn'
        });
    } catch(e) {
        console.log("Помилка завантаження гаманця", e);
    }

    // 3. Логіка додатку
    let currentBalance = 0.0000;
    let totalViews = 0;

    function watchAd() {
        alert("Тут запускатиметься реальне відео Adsgram!");
        currentBalance += 0.0050;
        totalViews += 1;
        document.getElementById('balance').innerText = currentBalance.toFixed(4);
        document.getElementById('stats-views').innerText = totalViews;
    }

    function withdraw() {
        alert("Мінімальна сума для виводу: 5 USDT.");
    }

    function switchScreen(screenId, element) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        document.getElementById('screen-' + screenId).classList.add('active');
        element.classList.add('active');
    }

    // 4. Генерація реферального посилання
    const botUsername = "WoodGrowCoinBot"; 
    document.getElementById('ref-link').value = `https://t.me{botUsername}/Grow?startapp=ref_${userId}`;

    function copyRefLink() {
        const copyText = document.getElementById("ref-link");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Посилання скопійовано!");
    }
</script>
</body>
</html>
