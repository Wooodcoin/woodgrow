<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodGrow Test</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body style="padding:20px; font-family:sans-serif; background:#000; color:#0f0;">

<h2>Тест Supabase</h2>
<p>ID: <span id="userid">завантаження...</span></p>
<p>Баланс: <span id="balance">0.0000</span></p>

<button onclick="testReward()" style="padding:15px; font-size:18px; margin:10px 0;">+0.0004 USDT (Тест)</button>
<button onclick="loadBalance()" style="padding:15px; font-size:18px;">Оновити баланс</button>

<script>
    const SUPABASE_URL = "https://ebgfhzizbcxsxpfqusap.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wSVAHiv6Wc7q6T5GVurACg_wiZSTlpt"; // ← Заміни якщо є інший

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let userId = "6043278492";

    async function testReward() {
        try {
            const result = await supabase.rpc('reward_user_safe', {
                user_id_param: parseInt(userId),
                reward_amount: 0.0004
            });
            
            alert("Результат: " + JSON.stringify(result));
            
            if (result.data !== null) {
                document.getElementById('balance').innerText = parseFloat(result.data).toFixed(4);
            }
        } catch(e) {
            alert("Помилка: " + e.message);
        }
    }

    async function loadBalance() {
        try {
            const { data } = await supabase
                .from('Users')
                .select('balance')
                .eq('id', userId)
                .single();
            
            document.getElementById('balance').innerText = parseFloat(data?.balance || 0).toFixed(4);
        } catch(e) {
            alert("Помилка завантаження: " + e.message);
        }
    }

    // Автозапуск
    document.getElementById('userid').innerText = userId;
    loadBalance();
</script>

</body>
</html>
