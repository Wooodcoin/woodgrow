<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoodGrow Автономний Тест</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-main: #0a1f0f; 
            --neon-green: #0df25d;
            --gold-gradient: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa7c11 100%);
            --gold-color: #d4af37;
            --text-dark: #111111;
            --text-light: #ffffff;
            --card-bg: rgba(212, 175, 55, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
            box-sizing: border-box;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--gold-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .balance-value {
            font-size: 38px;
            font-weight: 900;
            margin: 10px 0;
            color: #ffffff;
        }

        .btn {
            display: block;
            width: 100%;
            background: var(--gold-gradient);
            color: var(--text-dark);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 65px;
            background: #000000;
            border-top: 2px solid var(--gold-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            color: #71717a;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
        }
        
        .nav-item.active { 
            color: var(--neon-green); 
        }

        .nav-icon { display: block; font-size: 20px; }
    </style>
</head>
<body>

    <!-- Вкладка 1: ГОЛОВНА -->
    <div id="tab-main" class="tab-content active">
        <div class="card">
            <div style="font-size: 14px; color: var(--neon-green);">АВТОНОМНИЙ БАЛАНС (БЕЗ БАЗИ)</div>
            <div class="balance-value"><span id="user-balance">0.0000</span> USDT</div>
        </div>
        <button class="btn" onclick="addClickBalance()">Клікнути (+0.0004)</button>
    </div>

    <!-- Вкладка 2: КАБІНЕТ -->
    <div id="tab-profile" class="tab-content">
        <div class="card">
            <h3>Тестовий Кабінет</h3>
            <p>Якщо ти бачиш цей текст після натискання на кнопку меню, значить хостинг і навігація працюють!</p>
            <button class="btn" onclick="resetLocalData()" style="background: red; color: white;">Скинути баланс</button>
        </div>
    </div>

    <!-- НАВІГАЦІЯ -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('main', this)">
            <span class="nav-icon">⚙️</span>Головна
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <span class="nav-icon">🖥️</span>Кабінет
        </div>
    </div>

    <script>
        // Ініціалізація Telegram WebApp
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
                window.Telegram.WebApp.ready();
            }
        } catch(e) {
            console.error("Помилка Telegram SDK", e);
        }

        // Завантаження балансу з пам'яті телефону
        let balance = parseFloat(localStorage.getItem('test_balance')) || 0.0000;
        document.getElementById('user-balance').innerText = balance.toFixed(4);

        // Функція перемикання вкладок
        function switchTab(tabId, element) {
            // Ховаємо всі вкладки
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(c => c.classList.remove('active'));
            
            // Робимо всі кнопки меню неактивними
            const tabs = document.querySelectorAll('.nav-item');
            tabs.forEach(t => t.classList.remove('active'));

            // Показуємо потрібну вкладку
            document.getElementById(`tab-${tabId}`).classList.add('active');
            element.classList.add('active');
        }

        // Нарахування балансу (локально)
        function addClickBalance() {
            balance += 0.0004;
            document.getElementById('user-balance').innerText = balance.toFixed(4);
            localStorage.setItem('test_balance', balance.toString());
        }

        // Скидання даних
        function resetLocalData() {
            balance = 0.0000;
            document.getElementById('user-balance').innerText = balance.toFixed(4);
            localStorage.removeItem('test_balance');
            alert("Дані скинуто!");
        }
    </script>
</body>
</html>
