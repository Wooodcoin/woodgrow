<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodGrow Coin</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #162a17, #070d07);
            color: #f0f3f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        .header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(140, 217, 150, 0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
            color: #8cd996;
            text-transform: uppercase;
        }
        .content-section {
            flex: 1;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .content-section.active {
            display: flex;
        }
        .logo-container {
            font-size: 80px;
            margin: 20px 0;
        }
        .balance-card {
            background: rgba(43, 76, 45, 0.3);
            border: 1px solid #5c8a60;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            width: 85%;
        }
        .balance-label { font-size: 12px; color: #a3c2a8; text-transform: uppercase; }
        .balance-value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #5c8a60;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 2px solid #8cd996;
        }
        .username { font-size: 18px; font-weight: bold; margin-bottom: 20px; }

        .btn {
            width: 100%;
            max-width: 280px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }
        .btn-ton {
            background: linear-gradient(135deg, #0088cc, #005580);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #8d6e63, #4e342e);
        }

        .nav-bar {
            height: 65px;
            background: rgba(13, 26, 14, 0.95);
            border-top: 1px solid rgba(140, 217, 150, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #709475;
            font-size: 11px;
            cursor: pointer;
            flex: 1;
        }
        .nav-item.active { color: #8cd996; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>WoodGrow Coin</h1>
    </div>

    <!-- ЕКРАН 1: ВІДЕОРЕКЛАМА -->
    <div id="screen-home" class="content-section active">
        <div class="logo-container">🌳</div>
        <div class="balance-card">
            <div class="balance-label">Баланс рахунку</div>
            <div class="balance-value"><span id="balance">0.0000</span> USDT</div>
        </div>
        <button class="btn" onclick="watchAd()">👁 Дивитись відео (+0.005 USDT)</button>
    </div>

    <!-- ЕКРАН 2: ОСОБИСТИЙ КАБІНЕТ -->
    <div id="screen-profile" class="content-section">
        <div class="avatar" id="user-avatar">👤</div>
        <div class="username" id="user-name">Завантаження...</div>
        
        <div class="balance-card" style="width:100%;">
            <div class="balance-label">Переглянуто роликів</div>
            <div class="balance-value" id="stats-views">0</div>
        </div>
        
        <!-- ВСІ КНОПКИ ТЕПЕР ТУТ, ЯК У ВАШОМУ МЕНЮ -->
        <button class="btn btn-ton" onclick="redirectToBotWallet()">💎 Підключити гаманець</button>
        <button class="btn" onclick="shareInviteLink()">👥 Запросити друга</button>
        <button class="btn btn-secondary" onclick="alert('Мінімальний вивід: 5 USDT')">📥 Вивести кошти</button>
    </div>

    <!-- НИЖНЯ НАВІГАЦІЯ: ТЕПЕР ТІЛЬКИ ДВА ПУНКТИ -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchScreen('home', this)">
            <div class="nav-icon">👁</div>
            <div>Відеореклама</div>
        </div>
        <div class="nav-item" onclick="switchScreen('profile', this)">
            <div class="nav-icon">👤</div>
            <div>Особистий кабінет</div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let userId = "guest";
    let userName = "Користувач WoodGrow";

    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        userId = tg.initDataUnsafe.user.id || userId;
        userName = tg.initDataUnsafe.user.username ? '@' + tg.initDataUnsafe.user.username : (tg.initDataUnsafe.user.first_name || userName);
    }
    
    document.getElementById('user-name').innerText = userName;
    document.getElementById('user-avatar').innerText = userName.charAt(0) === '@' ? userName.charAt(1).toUpperCase() : userName.charAt(0).toUpperCase();

    const botUsername = "WoodGrowCoinBot"; 

    let bal = 0.0000;
    let views = 0;

    function watchAd() {
        alert("Тут запускатиметься реальне відео!");
        bal += 0.0050;
        views += 1;
        document.getElementById('balance').innerText = bal.toFixed(4);
        document.getElementById('stats-views').innerText = views;
    }

    function switchScreen(sId, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('screen-' + sId).classList.add('active');
        el.classList.add('active');
    }

    function shareInviteLink() {
        const textMessage = "Приєднуйся до WoodGrow Coin, дивись відео та заробляй USDT разом зі мною! 🌳💰";
        const myInviteLink = "https://t.me" + botUsername + "?start=ref_" + userId;
        const telegramShareUrl = "https://t.meshare/url?url=" + encodeURIComponent(myInviteLink) + "&text=" + encodeURIComponent(textMessage);
        tg.openTelegramLink(telegramShareUrl);
    }

    // Кнопка безпечно веде в чат вашого бота, запускаючи команду /wallet
    function redirectToBotWallet() {
        const botChatUrl = "https://t.me" + botUsername + "?start=wallet";
        tg.openTelegramLink(botChatUrl);
        tg.close(); 
    }
</script>
</body>
</html>
