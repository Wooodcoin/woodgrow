<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoodGrow Coin Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-main: #0a1f0f; 
            --neon-green: #0df25d;
            --gold-gradient: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa7c11 100%);
            --gold-color: #d4af37;
            --text-dark: #111111;
            --text-light: #ffffff;
            --card-bg: rgba(212, 175, 55, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--gold-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .balance-title {
            font-size: 14px;
            color: var(--neon-green);
            text-transform: uppercase;
            font-weight: bold;
        }

        .balance-value {
            font-size: 38px;
            font-weight: 900;
            margin: 10px 0;
        }

        .btn {
            display: block;
            width: 100%;
            background: var(--gold-gradient);
            color: var(--text-dark);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 65px;
            background: #000000;
            border-top: 2px solid var(--gold-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            color: #71717a;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
        }
        
        .nav-item.active { 
            color: var(--neon-green); 
        }

        .nav-icon { display: block; font-size: 20px; }
    </style>
</head>
<body>

    <div id="tab-main" class="tab-content active">
        <div class="card">
            <div class="balance-title">Мій Баланс</div>
            <div class="balance-value"><span id="user-balance">0.0000</span> USDT</div>
        </div>
        <button class="btn" onclick="simulateWatchAd()">Перегляд реклами (+0.0004)</button>
    </div>

    <div id="tab-wallet" class="tab-content">
        <div class="card">
            <h3>Гаманець TON</h3>
            <div id="ton-connect-btn"></div>
            <button class="btn" style="margin-top:20px;" onclick="withdrawFunds()">Вивести кошти (Мін. 5 USDT)</button>
        </div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div class="card" style="text-align: left;">
            <h3>Профіль користувача</h3>
            <p><strong>Ваш ID:</strong> <span id="user-id">Завантаження...</span></p>
            <p><strong>Реферали:</strong> <span id="ref-count">0 чол.</span></p>
            <p><strong>Реферальне посилання:</strong></p>
            <div id="ref-link" style="color:var(--neon-green); word-break:break-all; font-size:12px; background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;">Завантаження...</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('main', this)">
            <span class="nav-icon">⚙️</span>Головна
        </div>
        <div class="nav-item" onclick="switchTab('wallet', this)">
            <span class="nav-icon">💼</span>Гаманець
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <span class="nav-icon">🖥️</span>Кабінет
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Ініціалізація інтерфейсу відразу
        try {
            tg.expand();
            tg.ready();
        } catch(e) {}

        const SUPABASE_URL = "https://ebgfhzizbcxsxpfqusap.supabase.co";
        const SUPABASE_KEY = "sb_publishable_wSVAHiv6Wc7q6T5GVurACg_wiZSTlpt";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userId = "6043278492"; // Тестовий дефолт
        let balance = 0.0000;
        let userReferrer = null;

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id.toString();
        }

        document.getElementById('user-id').innerText = userId;
        document.getElementById('ref-link').innerText = `https://t.me/WoodGrowCoinBot?start=${userId}`;

        // Функція перемикання вкладок (працює залізно і незалежно від бази)
        function switchTab(tabId, element) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(c => c.classList.remove('active'));
            
            const tabs = document.querySelectorAll('.nav-item');
            tabs.forEach(t => t.classList.remove('active'));

            document.getElementById(`tab-${tabId}`).classList.add('active');
            element.classList.add('active');
            
            if (tabId === 'profile') loadRefCounter();
        }

        // Завантаження даних з Supabase
        async function loadUserSession() {
            try {
                let { data: user, error } = await supabase
                    .from('Users')
                    .select('*')
                    .eq('id', userId)
                    .maybeSingle();

                if (!user && !error) {
                    let referrerId = null;
                    if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                        const start = tg.initDataUnsafe.start_param.trim();
                        if (start !== userId) referrerId = start;
                    }

                    const { data: newUser } = await supabase
                        .from('Users')
                        .insert([{ id: userId, balance: 0.0000, referred_by: referrerId }])
                        .select()
                        .single();
                    user = newUser;
                }

                if (user) {
                    balance = parseFloat(user.balance) || 0.0000;
                    userReferrer = user.referred_by;
                    document.getElementById('user-balance').innerText = balance.toFixed(4);
                }
            } catch (e) {
                alert("Помилка підключення до Supabase: " + e.message);
            }
        }

        async function loadRefCounter() {
            try {
                const { count, error } = await supabase
                    .from('Users')
                    .select('*', { count: 'exact', head: true })
                    .eq('referred_by', userId);
                if (!error && count !== null) {
                    document.getElementById('ref-count').innerText = `${count} чол.`;
                }
            } catch(e) {}
        }

        async function simulateWatchAd() {
            try {
                let newBalance = balance + 0.0004;
                const { error } = await supabase
                    .from('Users')
                    .update({ balance: newBalance })
                    .eq('id', userId);

                if (!error) {
                    balance = newBalance;
                    document.getElementById('user-balance').innerText = balance.toFixed(4);
                    alert("Успішно нараховано +0.0004 USDT!");
                    
                    if (userReferrer) {
                        // Нарахування 10% рефереру
                        let { data: rUser } = await supabase.from('Users').select('balance').eq('id', userReferrer).maybeSingle();
                        if (rUser) {
                            let rBonus = (parseFloat(rUser.balance) || 0) + 0.00004;
                            await supabase.from('Users').update({ balance: rBonus }).eq('id', userReferrer);
                        }
                    }
                } else {
                    alert("Помилка бази даних: " + error.message);
                }
            } catch(e) {
                alert("Критична помилка запиту: " + e.message);
            }
        }

        async function withdrawFunds() {
            if (balance < 5.0) {
                alert("Мінімальна сума — 5 USDT. Ваш баланс: " + balance.toFixed(4));
                return;
            }
            // Логіка виведення...
        }

        // Старт сесії
        loadUserSession();
    </script>
</body>
</html>
