<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodGrow Монетизація</title>
    <!-- Підключаємо скрипт Adsgram (Сервіс 1) -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #2d2d2d;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #4caf50; font-size: 24px; margin-bottom: 5px; }
        .balance-box {
            font-size: 22px;
            margin: 20px 0;
            background: #3d3d3d;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #4caf50;
        }
        .balance-value { font-weight: bold; color: #4caf50; }
        
        /* Стилі рекламних кнопок */
        .ad-button {
            display: block;
            width: 100%;
            padding: 14px 0;
            margin: 12px 0;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .ad-button:active { transform: scale(0.98); }
        
        #btn-service1 { background: #0088cc; } /* Adsgram */
        #btn-service2 { background: #ff9800; } /* Adsterra 1 */
        #btn-service3 { background: #9c27b0; } /* HilltopAds */
        #btn-service4 { background: #e91e63; } /* Adsterra 2 */
        
        .ad-button:disabled {
            background: #555555 !important;
            color: #888888;
            cursor: not-allowed;
            transform: none;
        }
        
        #cooldown-timer {
            font-size: 18px;
            color: #ff5722;
            font-weight: bold;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WoodGrow</h1>
    <p>Переглядайте рекламу та заробляйте реальний баланс!</p>
    
    <div class="balance-box">
        Баланс: <span id="balance" class="balance-value">$0.0000</span>
    </div>

    <!-- 4 Рекламні сервіси -->
    <button id="btn-service1" class="ad-button" onclick="watchAdsgram()">Сервіс 1 (Відео Adsgram)</button>
    <button id="btn-service2" class="ad-button" onclick="watchDirectLink('https://www.effectivecpmnetwork.com/gbzuytbhy?key=8595ffd9c4e7bfcd3fbacb124a4b0c74')">Сервіс 2 (Швидка Adsterra)</button>
    <button id="btn-service3" class="ad-button" onclick="watchDirectLink('https://affectionatestorage.com/gQiXSO')">Сервіс 3 (Бонус HilltopAds)</button>
    <button id="btn-service4" class="ad-button" onclick="watchDirectLink('https://pl29851117.effectivecpmnetwork.com/c4/5d/93/c45d93c72f9027c7dbf67dbfb73d6488.js')">Сервіс 4 (Мега Adsterra)</button>

    <!-- Таймер блокування -->
    <div id="cooldown-timer">Наступний клік через: <span id="timer-seconds">120</span> сек</div>
</div>

<script>
    // Ініціалізація Adsgram із вашим правильним ID: 35910
    const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "35910" }) : null;

    // Завантажуємо баланс (якщо новий користувач — ставимо 0.0)
    let balance = parseFloat(localStorage.getItem('user_balance')) || 0.0;
    document.getElementById('balance').innerText = "$" + balance.toFixed(4);

    // Перевіряємо, чи активний таймер після перезавантаження сторінки
    checkCooldown();

    // Логіка для Сервісу 1 (Adsgram відео)
    function watchAdsgram() {
        if (!AdController) {
            alert("Завантаження реклами... Спробуйте ще раз за секунду.");
            return;
        }
        
        AdController.show().then((result) => {
            // Відео переглянуто повністю
            rewardUser();
        }).catch((result) => {
            // Користувач закрив рекламу раніше часу
            alert("Для отримання $0.0015 потрібно додивитися відео до кінця.");
        });
    }

    // Логіка для Сервісів 2, 3 та 4 (Прямі рекламні лінки)
    function watchDirectLink(url) {
        // Відкриваємо вікно з рекламою у новій вкладці
        window.open(url, '_blank');
        
        // Автоматично зараховуємо винагороду за перехід та блокуємо додаток
        setTimeout(() => {
            rewardUser();
        }, 1000);
    }

    // Нарахування доларів та запуск кулдауну
    function rewardUser() {
        // Додаємо рівно $0.0015 із математичним округленням до 4 знаків
        balance = parseFloat((balance + 0.0015).toFixed(4));
        
        // Зберігаємо та оновлюємо на екрані
        localStorage.setItem('user_balance', balance);
        document.getElementById('balance').innerText = "$" + balance.toFixed(4);
        
        // Фіксуємо час закінчення блокування (поточний час + 120 секунд)
        const expireTime = Date.now() + 120000;
        localStorage.setItem('cooldown_expire', expireTime);
        
        checkCooldown();
    }

    // Робота таймера зворотного відліку
    function checkCooldown() {
        const expireTime = localStorage.getItem('cooldown_expire');
        if (!expireTime) return;

        const remaining = Math.ceil((expireTime - Date.now()) / 1000);

        if (remaining > 0) {
            setButtonsState(true); // Вимикаємо всі кнопки
            const timerLayout = document.getElementById('cooldown-timer');
            const timerSeconds = document.getElementById('timer-seconds');
            timerLayout.style.display = 'block';
            timerSeconds.innerText = remaining;

            const interval = setInterval(() => {
                const currentRemaining = Math.ceil((expireTime - Date.now()) / 1000);
                if (currentRemaining <= 0) {
                    clearInterval(interval);
                    setButtonsState(false); // Вмикаємо кнопки назад
                    timerLayout.style.display = 'none';
                    localStorage.removeItem('cooldown_expire');
                } else {
                    timerSeconds.innerText = currentRemaining;
                }
            }, 1000);
        } else {
            setButtonsState(false);
            document.getElementById('cooldown-timer').style.display = 'none';
            localStorage.removeItem('cooldown_expire');
        }
    }

    // Функція керування станом кнопок (активні/заблоковані)
    function setButtonsState(disabled) {
        document.getElementById('btn-service1').disabled = disabled;
        document.getElementById('btn-service2').disabled = disabled;
        document.getElementById('btn-service3').disabled = disabled;
        document.getElementById('btn-service4').disabled = disabled;
    }
</script>

</body>
</html>
